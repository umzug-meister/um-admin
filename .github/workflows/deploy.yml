name: Deploy

on:
  push:
    branches:
      - main

permissions:
  packages: read
  contents: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  VITE_MAIL_PROXY_URL: ${{ vars.MAIL_PROXY_URL }}
  VITE_MAIL_PROXY_API_KEY: ${{ secrets.MAIL_PROXY_API_KEY }}
  VITE_GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@umzug-meister"

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install modules
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: npm test

      - name: Set version datetime
        run: echo "VITE_APP_VERSION=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Build for Webgo
        env:
          VITE_BASE_PATH: /wp-content/plugins/um-configurator/app-dist/rcAdmin/
          VITE_MAIL_ENABLED: false
          VITE_APP_TARGET: umzugruckzuck
        run: |
          npx vite build
          mv build build-webgo

      - name: Build for Hostinger
        env:
          VITE_BASE_PATH: /wp-content/plugins/um-configurator/app-dist/konfigurator/
          VITE_MAIL_ENABLED: true
          VITE_APP_TARGET: umzugruckzuck24
        run: |
          npx vite build
          mv build build-hostinger

      - name: Upload Webgo artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-webgo
          path: build-webgo/

      - name: Upload Hostinger artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-hostinger
          path: build-hostinger/

  deploy:
    name: Deploy to ${{ matrix.target }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [webgo, hostinger]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: build/

      - name: Deploy to ${{ matrix.target }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        env:
          webgo_host: ${{ secrets.FTP_HOST }}
          webgo_user: ${{ secrets.FTP_USER }}
          webgo_pass: ${{ secrets.FTP_PASS }}
          webgo_dir: ${{ vars.REMOTE_DIR }}
          hostinger_host: ${{ secrets.HOSTINGER_HOST }}
          hostinger_user: ${{ secrets.HOSTINGER_USER }}
          hostinger_pass: ${{ secrets.HOSTINGER_PASS }}
          hostinger_dir: ${{ vars.HOSTINGER_REMOTE_DIR }}
        with:
          protocol: ftp
          server: ${{ matrix.target == 'webgo' && env.webgo_host || env.hostinger_host }}
          username: ${{ matrix.target == 'webgo' && env.webgo_user || env.hostinger_user }}
          password: ${{ matrix.target == 'webgo' && env.webgo_pass || env.hostinger_pass }}
          local-dir: ${{ github.workspace }}/build/
          server-dir: ${{ matrix.target == 'webgo' && env.webgo_dir || env.hostinger_dir }}
          exclude: |
            build/index.html
